title: HealthPlus User Guide
description: Comprehensive guide to the Lab Results Dashboard - Transform conventional lab results into functional medicine interpretations
theme: just-the-docs

url: https://hulupeep.github.io
baseurl: /healthplus-help

# Enable search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Aux links for the upper right navigation
aux_links:
  "HealthPlus App":
    - "https://github.com/Hulupeep/healthplus"

# Footer content
footer_content: "Copyright &copy; 2024 HealthPlus. Distributed under the MIT License."

# Color scheme
color_scheme: light

# Navigation structure
nav_sort: case_sensitive

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Enable heading anchors
heading_anchors: true

# Callouts
callouts:
  warning:
    title: Warning
    color: yellow
  note:
    title: Note
    color: blue
  important:
    title: Important
    color: green
  tip:
    title: Tip
    color: purple

# Collections for documentation
collections:
  docs:
    permalink: "/:collection/:path/"
    output: true

just_the_docs:
  collections:
    docs:
      name: Documentation
      nav_exclude: false
      search_exclude: false
